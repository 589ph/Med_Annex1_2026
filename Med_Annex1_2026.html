<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>診療情報提供書 作成ツール</title>
    <script src="https://cdn.tailwindcss.com">
// Enterで次の入力欄へ移動
document.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
        const el = document.activeElement;
        if(el.tagName === 'TEXTAREA') return; // textareaは改行
        e.preventDefault();
        const focusables = Array.from(document.querySelectorAll('input, select, textarea'))
            .filter(el => !el.disabled && el.offsetParent !== null);
        const index = focusables.indexOf(el);
        if(index > -1 && index < focusables.length - 1){
            focusables[index + 1].focus();
        }
    }
});


function clearSection(btn){
    const card = btn.closest('.form-card');
    const inputs = card.querySelectorAll('input, textarea, select');
    inputs.forEach(el=>{
        if(el.tagName === 'SELECT'){
            el.selectedIndex = 0;
        } else {
            el.value = '';
        }
    });
    syncUpdate();
}

</script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f1f5f9; margin: 0; }

        @media screen {
            .app-container { display: flex; height: 100vh; overflow: hidden; }
            .side-form { width: 450px; background: white; padding: 24px; overflow-y: auto; box-shadow: 4px 0 15px rgba(0,0,0,0.1); z-index: 10; }
            .main-preview { flex-grow: 1; padding: 20px; background: #e2e8f0; display: flex; justify-content: center; overflow-y: auto; }

            .page-a4 {
                width: 210mm;
                min-height: 297mm;
                background: white;
                padding: 10mm 15mm;
                box-shadow: 0 10px 30px rgba(0,0,0,0.1);
                box-sizing: border-box;
                transform-origin: top center;
            }
            @media (max-width: 1450px) { .page-a4 { transform: scale(0.8); } }
            @media (max-width: 1100px) { .page-a4 { transform: scale(0.6); } }

            #print-only-container { display: none; }
        }

        @media print {
            @page { 
                margin: 0; 
                size: A4;
            }
            body { background: white !important; }
            .app-container, .no-print { display: none !important; }
            #print-only-container { 
                display: block !important; 
                width: 210mm !important;
                background: white !important;
            }
            .print-page {
                width: 210mm !important;
                height: 297mm !important;
                padding: 15mm 18mm !important; 
                box-sizing: border-box !important;
                background: white !important;
                position: relative;
                page-break-after: always;
            }
            table { border: 1.2px solid black !important; }
            th, td { border: 1px solid black !important; -webkit-print-color-adjust: exact; }
            .bg-label { background-color: #f8fafc !important; -webkit-print-color-adjust: exact; }
        }

        .doc-table { width: 100%; border-collapse: collapse; border: 1.2px solid black; margin-bottom: 6px; table-layout: fixed; }
        .doc-table td { border: 1px solid black; padding: 5px 8px; vertical-align: top; font-size: 0.85rem; color: black; word-wrap: break-word; line-height: 1.3; }
        .bg-label { background-color: #f8fafc; font-weight: bold; width: 100px; text-align: center; font-size: 0.75rem; vertical-align: middle !important; }
        .form-card { background: #fff; border-radius: 8px; padding: 14px; border: 1px solid #e2e8f0; margin-bottom: 12px; }

        .notes-section { 
            margin-top: 8px; 
            font-size: 8.5px; 
            border-top: 1px solid black; 
            padding-top: 4px; 
            line-height: 1.4;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="app-container no-print">
        <aside class="side-form">
            <h1 class="text-xl font-bold mb-4 border-b pb-2 text-slate-800">診療情報提供書 作成</h1>

            <div class="space-y-3">
                <div class="form-card">
                    <label class="block text-xs font-bold text-blue-600 mb-2">基本情報 & 紹介先</label>
                    <input type="date" id="date" class="w-full border p-2 mb-2 rounded text-sm" oninput="syncUpdate()">
                    <input type="text" id="toHospital" placeholder="紹介先 医療機関名" class="w-full border p-2 mb-2 rounded text-sm" oninput="syncUpdate()">
                    <input type="text" id="toDoctor" placeholder="担当医" class="w-full border p-2 rounded text-sm" oninput="syncUpdate()">
                
<div style="text-align:right; margin-top:6px;">
<button type="button" onclick="clearSection(this)" style="font-size:11px; color:#64748b;">クリア</button>
</div>

                </div>

                <div class="form-card">
                    <label class="block text-xs font-bold text-green-600 mb-2">紹介元情報（自院の情報）</label>
                    <input type="text" id="fromAddress" placeholder="自院 所在地" class="w-full border p-2 mb-1 rounded text-sm" oninput="syncUpdate()">
                    <input type="text" id="fromHospital" placeholder="自院 名称" class="w-full border p-2 mb-1 rounded text-sm" oninput="syncUpdate()">
                    <input type="text" id="fromPhone" placeholder="電話番号" class="w-full border p-2 mb-1 rounded text-sm" oninput="syncUpdate()">
                    <input type="text" id="fromDoctor" placeholder="紹介元 医師名" class="w-full border p-2 rounded text-sm" oninput="syncUpdate()">
                
<div style="text-align:right; margin-top:6px;">
<button type="button" onclick="clearSection(this)" style="font-size:11px; color:#64748b;">クリア</button>
</div>

                </div>

                <div class="form-card">
                    <label class="block text-xs font-bold text-gray-400 mb-1">患者情報</label>
                    <input type="text" id="patientName" placeholder="氏名" class="w-full border p-2 mb-2 rounded font-bold text-sm" oninput="syncUpdate()">
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <select id="patientGender" class="border p-2 rounded text-sm" onchange="syncUpdate()">
                            <option value="男">男</option><option value="女">女</option>
                        </select>
                        <input type="number" id="patientAge" placeholder="年齢" class="border p-2 rounded text-sm" oninput="syncUpdate()">
                    </div>
                    <input type="date" id="patientBirthdayInput" class="w-full border p-2 mb-1 rounded text-sm" oninput="handleBirthday(this.value)">
                    <input type="text" id="patientBirthday" placeholder="生年月日" class="w-full border p-2 mb-2 rounded bg-slate-50 text-sm" oninput="syncUpdate()">
                    <input type="text" id="patientAddress" placeholder="住所" class="w-full border p-2 rounded text-sm" oninput="syncUpdate()">
                
<div style="text-align:right; margin-top:6px;">
<button type="button" onclick="clearSection(this)" style="font-size:11px; color:#64748b;">クリア</button>
</div>

                </div>

                <div class="form-card">
                    <label class="block text-xs font-bold text-blue-600 mb-1">診療内容</label>
                    <input type="text" id="diseaseName" placeholder="傷病名" class="w-full border p-2 mb-2 rounded text-sm font-bold" oninput="syncUpdate()">
                    <input type="text" id="purpose" placeholder="紹介目的" class="w-full border p-2 mb-2 rounded text-sm" oninput="syncUpdate()">

                    <textarea id="history" class="w-full border p-2 rounded h-16 text-sm mb-2" placeholder="既往歴及び家族歴" oninput="syncUpdate()"></textarea>
                    <textarea id="progress" class="w-full border p-2 rounded h-24 text-sm mb-2" placeholder="症状経過及び検査結果" oninput="syncUpdate()"></textarea>
                    <textarea id="treatment" class="w-full border p-2 rounded h-16 text-sm mb-2" placeholder="治療経過" oninput="syncUpdate()"></textarea>
                    <textarea id="prescription" class="w-full border p-2 rounded h-16 text-sm mb-2" placeholder="現在の処方" oninput="syncUpdate()"></textarea>
                    <textarea id="remarks" class="w-full border p-2 rounded h-14 text-sm" placeholder="備考" oninput="syncUpdate()"></textarea>
                </div>

                
<div style="text-align:right; margin-top:6px;">
<button type="button" onclick="clearSection(this)" style="font-size:11px; color:#64748b;">クリア</button>
</div>

                <div class="flex gap-2 pb-10">
                    <button onclick="window.print()" class="flex-grow bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all">
                        PDF保存 / 印刷
                    </button>
                    <button onclick="saveHTMLFile()" class="p-4 border rounded-xl bg-white hover:bg-slate-50 text-slate-400" title="HTML保存">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    </button>
                </div>
            </div>
        </aside>

        <main class="main-preview">
            <div id="preview-sheet" class="page-a4"></div>
        </main>
    </div>

    <div id="print-only-container">
        <div id="print-sheet" class="print-page"></div>
    </div>

    <script>
        const FIELDS = [
            'date', 'toHospital', 'toDoctor', 
            'fromAddress', 'fromHospital', 'fromPhone', 'fromDoctor',
            'patientName', 'patientGender', 'patientAge', 'patientBirthday', 'patientAddress', 
            'diseaseName', 'purpose', 'history', 'progress', 'treatment', 'prescription', 'remarks'
        ];

        function getWareki(dateStr) {
            if (!dateStr) return "";
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            const year = d.getFullYear();
            const month = d.getMonth() + 1;
            const day = d.getDate();
            let era = "", eraYear = 0;
            if (year >= 2019) { era = "令和"; eraYear = year - 2018; }
            else if (year >= 1989) { era = "平成"; eraYear = year - 1988; }
            else if (year >= 1926) { era = "昭和"; eraYear = year - 1925; }
            else return `${year}年${month}月${day}日`;
            return `${era}${eraYear === 1 ? "元" : eraYear}年${month}月${day}日`;
        }

        function handleBirthday(val) {
            if (!val) return;
            document.getElementById('patientBirthday').value = getWareki(val);
            const birth = new Date(val);
            const today = new Date();
            let age = today.getFullYear() - birth.getFullYear();
            if (today.getMonth() < birth.getMonth() || (today.getMonth() === birth.getMonth() && today.getDate() < birth.getDate())) age--;
            document.getElementById('patientAge').value = age;
            syncUpdate();
        }

        function generateDocumentHTML(data) {
            const dateDisplay = data.date ? getWareki(data.date) : "令和　年　月　日";
            return `
                <div class="flex justify-between items-end mb-1" style="font-size: 9px;">
                    <span>(別紙様式11)</span>
                    <span style="font-size: 13px; border-bottom: 1px solid black; padding: 0 10px;">${dateDisplay}</span>
                </div>

                <h2 style="text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 12px; letter-spacing: 0.5em; border-bottom: 2.2px solid black; padding-bottom: 2px;">診療情報提供書</h2>

                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <div style="width: 53%;">
                        <div style="font-size: 0.85rem; margin-bottom: 4px;">
                            紹介先医療機関等名：<br>
                            <span style="border-bottom: 1px solid black; display: inline-block; min-width: 210px; font-size: 1rem; margin-top: 2px; font-weight:500;">${data.toHospital}</span>
                        </div>
                        <div style="font-size: 0.85rem;">
                            担当医：<br>
                            <span style="border-bottom: 1px solid black; display: inline-block; min-width: 150px; font-size: 1rem; margin-top: 2px; font-weight:500;">${data.toDoctor}</span> 先生
                        </div>
                    </div>
                    <div style="border: 1.5px solid black; padding: 6px; width: 250px; font-size: 9.5px; line-height: 1.3; overflow: hidden;">
                        紹介元医療機関の所在地及び名称<br>
                        <div style="min-height: 14px; margin-top: 4px; border-bottom: 1px dotted #ccc;">${data.fromAddress}</div>
                        <div style="min-height: 14px; margin-top: 4px; border-bottom: 1px dotted #ccc; font-weight: bold;">${data.fromHospital}</div>
                        <div style="height: 14px; margin-top: 4px; border-bottom: 1px dotted #888;">電話番号：${data.fromPhone}</div>
                        <div style="margin-top: 6px;">医師名：<span style="font-weight: bold; font-size: 11px;">${data.fromDoctor}</span> <span style="float: right; margin-right: 10px;">(印)</span></div>
                    </div>
                </div>

                <table class="doc-table">
                    <tr>
                        <td class="bg-label" style="height: 34px;">患者氏名</td>
                        <td style="font-size: 1.15rem; font-weight: bold; vertical-align: middle;">${data.patientName}</td>
                        <td class="bg-label" style="width: 50px;">性別</td>
                        <td style="width: 50px; text-align: center; vertical-align: middle;">${data.patientGender}</td>
                    </tr>
                    <tr>
                        <td class="bg-label" style="height: 28px;">住所</td>
                        <td colspan="3" style="vertical-align: middle;">${data.patientAddress}</td>
                    </tr>
                    <tr>
                        <td class="bg-label" style="height: 28px;">生年月日</td>
                        <td style="vertical-align: middle;">${data.patientBirthday}</td>
                        <td class="bg-label">年齢</td>
                        <td style="vertical-align: middle;">${data.patientAge} 歳</td>
                    </tr>
                </table>

                <table class="doc-table" style="height: 640px;">
                    <tr>
                        <td class="bg-label" style="height: 40px;">傷病名</td>
                        <td style="font-weight: bold; vertical-align: middle;">${data.diseaseName}</td>
                    </tr>
                    <tr>
                        <td class="bg-label" style="height: 40px;">紹介目的</td>
                        <td style="vertical-align: middle;">${data.purpose}</td>
                    </tr>
                    <tr>
                        <td class="bg-label" style="height: 90px;">既往歴及び<br>家族歴</td>
                        <td style="white-space: pre-wrap;">${data.history}</td>
                    </tr>
                    <tr>
                        <td class="bg-label" style="height: 150px;">症状経過及び<br>検査結果</td>
                        <td style="white-space: pre-wrap;">${data.progress}</td>
                    </tr>
                    <tr>
                        <td class="bg-label" style="height: 90px;">治療経過</td>
                        <td style="white-space: pre-wrap;">${data.treatment}</td>
                    </tr>
                    <tr>
                        <td class="bg-label" style="height: 80px;">現在の処方</td>
                        <td style="white-space: pre-wrap;">${data.prescription}</td>
                    </tr>
                    <tr>
                        <td class="bg-label" style="height: 50px;">備考</td>
                        <td style="white-space: pre-wrap;">${data.remarks}</td>
                    </tr>
                </table>

                <div class="notes-section">
                    【記載上の注意】<br>
                    1. 必要に応じて、エックス線写真、検査結果、心電図等を添付すること。<br>
                    2. 紹介先が保険医療機関以外の施設等の場合には、「紹介先医療機関等名」の欄に適宜修正して記載すること。<br>
                    3. 別の用紙（診療録の写し等）を添付する場合には、本表に添付する旨及び添付枚数を記載し、本表の各欄の記載を適宜省略して差し支えないこと。<br>
                    4. 医師が自署する場合には、押印を省略することができる。
                </div>
            `;
        }

        function syncUpdate() {
            const data = {};
            FIELDS.forEach(f => {
                data[f] = document.getElementById(f).value || "";
            });
            const html = generateDocumentHTML(data);
            document.getElementById('preview-sheet').innerHTML = html;
            document.getElementById('print-sheet').innerHTML = html;
        }

        function saveHTMLFile() {
            FIELDS.forEach(f => {
                const el = document.getElementById(f);
                if (el) el.setAttribute('value', el.value);
            });
            const blob = new Blob(["<!DOCTYPE html>\n" + document.documentElement.outerHTML], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `診療情報提供書_${document.getElementById('patientName').value || '未入力'}.html`;
            a.click();
        }

        window.onload = () => {
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            syncUpdate();
        };
    
// Enterで次の入力欄へ移動
document.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
        const el = document.activeElement;
        if(el.tagName === 'TEXTAREA') return; // textareaは改行
        e.preventDefault();
        const focusables = Array.from(document.querySelectorAll('input, select, textarea'))
            .filter(el => !el.disabled && el.offsetParent !== null);
        const index = focusables.indexOf(el);
        if(index > -1 && index < focusables.length - 1){
            focusables[index + 1].focus();
        }
    }
});


function clearSection(btn){
    const card = btn.closest('.form-card');
    const inputs = card.querySelectorAll('input, textarea, select');
    inputs.forEach(el=>{
        if(el.tagName === 'SELECT'){
            el.selectedIndex = 0;
        } else {
            el.value = '';
        }
    });
    syncUpdate();
}

</script>
</body>
</html>
